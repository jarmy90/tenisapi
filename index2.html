    async function selectEvent(data) {
      const myNonce = ++selectNonce;
      // Flag: si aplicamos ODDS, no sobreescribir con estimación por forma
      let oddsApplied = false;
      // ── Auto-ODDS (sin preguntas): fija favorito a la derecha y sesgo inicial
      try {
        if (data && data.sport === 'football' && data.idEvent) {
          const odds = await fetchOddsForMatch({ home: data.home, away: data.away, leagueId: data.idLeague });
          if (myNonce !== selectNonce) return;
          if (odds && odds.oh && odds.oa) {
            const idxHome = oddsToIdx(odds.oh, odds.od, odds.oa);
            oddsApplied = true;
            // Deriva fuerza base para el motor (no afecta UI).
            data.homeStrength = clamp(0.5 + (idxHome / 12), 0.05, 0.95);
            const favKey = (Math.abs(idxHome) < 0.25) ? 'none' : (idxHome > 0 ? 'home' : 'away');
            match.display = match.display || { leftKey: 'away', rightKey: 'home', favKey: 'none', eps: 0.02 };
            match.display.favKey = favKey;
            const rightKey = (favKey !== 'none') ? favKey : 'home';
            setSides(rightKey);
            renderLabels();
            data.idxBase = clamp(Math.abs(idxHome), 0, 7);
            data.commence_time = odds.commence_time;
          }
        }
      } catch (e) { }

      // Kickoff (para congelar pre-partido)
      try { data.kickoffMs = computeKickoffMs(data); } catch (e) { }

      if (pos) { showToast('Cierra tu posición primero'); return; }
      stopPolling();
      sim.active = true;
      sim.freeze = false;
      sim.v = 0;
      sim.lastT = 0;
      sim.tennis = null;
      sim.tennisProg = 0;
      sim.tennisTestMode = false;
      sim.testMode = false;
      if (afId) cancelAnimationFrame(afId);

      const s = data.sport;
      match.sport = s;
      applyPitchTheme(s);
      // Tabs arriba
      document.querySelectorAll('#topbar .stab').forEach(b => b.classList.remove('on'));
      if (s === 'tennis') document.querySelectorAll('#topbar .stab')[1]?.classList.add('on');
      else document.querySelectorAll('#topbar .stab')[0]?.classList.add('on');

      // --- Estimar favorito (sin cuotas) ---
      let pHome = (typeof data.homeStrength === 'number') ? data.homeStrength : 0.5;
      if (!oddsApplied && data.idHomeTeam && data.idAwayTeam) {
        try {
          pHome = await estimateHomeStrengthFromForm(data.idHomeTeam, data.idAwayTeam);
          if (myNonce !== selectNonce) return;
        } catch (e) {
          // si falla, seguimos con 0.5
        }
      }
      pHome = clamp(pHome, 0.05, 0.95);

      if (!oddsApplied) {
        const favKey = decideFavKey(pHome, match.display?.eps ?? 0.02);

        // Favorito SIEMPRE a la derecha (si no hay favorito, home/local a la derecha)
        match.display = match.display || { leftKey: 'away', rightKey: 'home', favKey: 'none', eps: 0.02 };
        match.display.favKey = favKey;
        const rightKey = (favKey !== 'none') ? favKey : 'home';
        setSides(rightKey);
        renderLabels();

      }
      // ── Índice inicial (posición de arranque de la bola) ─────────────
      // Si no hay odds, derivamos idxBase desde pHome (forma) de forma SUAVE y realista.
      if (data.idxBase == null || !Number.isFinite(data.idxBase)) {
        const rK = (match.display && match.display.rightKey) ? match.display.rightKey : 'home';
        const pRight = (rK === 'home') ? pHome : (1 - pHome);
        const diff = Math.abs(2 * pRight - 1); // 0..1
        data.idxBase = probDiffToIdx(diff);
      }

      // Pasa la fuerza al initMatch
      data.homeStrength = pHome;

      // Hide overlay, init match, start animation
      const nm = document.getElementById('no-match'); if (nm) nm.style.display = 'none';
      initMatch(data);

      // If it's a test match with no real event id (neither TheSportsDB nor Worker)
      if (!data.idEvent && !data.lsEid && !data.eid) {
        if (s === 'tennis') {
          document.getElementById('live-score').innerText = 'S1 0-0';
          runTennisSim();
        } else {
          runFootballSim();
        }
      } else {
        if (s === 'football') {
          if (data.lsEid) {
            // ✅ Partido del Worker: live polling real-time
            startLsPolling(data.lsEid, data.lsDate || ymdLocal(0), 'soccer');
          } else if (data.idEvent) {
            startPolling(data.idEvent); // TheSportsDB fallback
          } else {
            runFootballSim(); // ninguno → sim
          }
        } else if (s === 'tennis') {
          if (TENNIS_LIVE_PROVIDER === 'sofascore' && data.sofaEventId) {
            startTennisLiveSofaById(data.sofaEventId);
          } else if (TENNIS_LIVE_PROVIDER === 'sofascore' && !data.eid) {
            const k = data.kickoffMs || computeKickoffMs(data) || Date.now();
            startTennisLiveSofa(data.home, data.away, k);
          } else if (data.eid) {
            // LiveScore tennis: arrancar poller + sim para la bola
            startLsPolling(data.eid, data.lsDate || ymdLocal(0), 'tennis');
            runTennisSim();
          } else {
            showFlash('🎾 Partido cargado · sim activa');
            runTennisSim();
          }
        } else {
          startPolling(data.idEvent);
        }
      }

      afId = requestAnimationFrame(frame);
      hm('m-events');
    }


    // Click seguro desde tarjetas (evita problemas de comillas en nombres como O'Higgins, etc.)
    function selectEventFromP(cardEl) {
      try {
        const enc = cardEl?.dataset?.p;
        if (!enc) return;
        const data = JSON.parse(decodeURIComponent(enc));
        selectEvent(data);
      } catch (e) { console.error('selectEventFromP error', e); }
    }

    // ── HELPERS ────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    // Captura errores JS y muestra aviso (evita 'pantalla congelada')
    window.addEventListener('error', (ev) => {
      try { showToast('⚠️ Error JS: ' + (ev.message || 'desconocido')); } catch (e) { }
    });


    // ── ZOOM (ventana alrededor de la bola) ───────────────────────────
    let zoomOn = false;
    let VIEW_RANGE = 10; // Fijo para ambos deportes (diez arriba, diez abajo)
    let ZOOM_RANGE = 2.0; // Zoom estricto
    const BALL_R = 9; // radio del círculo principal

    // Desplazamiento vertical (look-ahead) en ZOOM: evita que la bola quede siempre centrada
    // y la coloca más arriba si el índice es positivo, más abajo si es negativo.
    let ZOOM_LEAD_K = 0.20;   // cuánto bascula por punto de índice (suavizado a 0.20 para flotar más)
    let ZOOM_LEAD_MAX = 0.85; // % del rango máximo permitido para no pegarse al borde

    let zoomCenter = 0;     // centro de cámara (suavizado)
    let zoomCenterUI = 0;   // centro de la leyenda (seguirá al centro de vista)

    // Cámara (para mantener bola y background sincronizados en ZOOM)
    let camS = 1;
    let camPanX = 0;
    let camPanY = 0;
    let camViewCenter = 0;
    function renderAxisLabels() {
      const gov = document.getElementById('gov-timeline');
      if (!gov) return;

      if (!zoomOn) {
        gov.innerHTML = `
      <div class="gl-row" data-v="+10"><span>+10</span><div class="line"></div></div>
      <div class="gl-row" data-v="+5"><span>+5</span><div class="line"></div></div>
      <div class="gl-row main" data-v="0"><span>0</span><div class="line"></div></div>
      <div class="gl-row" data-v="-5"><span>-5</span><div class="line"></div></div>
      <div class="gl-row" data-v="-10"><span>-10</span><div class="line"></div></div>
    `;
        return;
      }

      const r = ZOOM_RANGE;
      const c = zoomCenterUI;
      const fmt = (v) => {
        const s = (v > 0 ? '+' : (v < 0 ? '' : ''));
        return s + v.toFixed(1);
      };

      gov.innerHTML = `
    <div class="gl-row" data-v="t"><span>${fmt(c + r)}</span><div class="line"></div></div>
    <div class="gl-row" data-v="m"><span>${fmt(c + r / 2)}</span><div class="line"></div></div>
    <div class="gl-row main" data-v="c"><span>${fmt(c)}</span><div class="line"></div></div>
    <div class="gl-row" data-v="m2"><span>${fmt(c - r / 2)}</span><div class="line"></div></div>
    <div class="gl-row" data-v="b"><span>${fmt(c - r)}</span><div class="line"></div></div>
  `;
    }

    function applyBackgroundZoom() {
      const pv = document.getElementById('pitch-visual');
      const pitch = document.getElementById('pitch');
      if (!pv || !pitch) return;

      if (!zoomOn) {
        pv.style.transformOrigin = '50% 50%';
        pv.style.transform = '';
        camS = 1; camPanX = 0; camPanY = 0; camViewCenter = 0;
        return;
      }

      // Zoom + parallax X (avance) + basculación Y.
      // Nota: en CSS las funciones se aplican right-to-left, así que scale() ocurre antes y translate() después.
      // Resultado: la traslación está en px de pantalla (no se escala).
      const W = pitch.clientWidth || 1;
      const H = pitch.clientHeight || 1;
      const cx = W / 2, cy = H / 2;

      // Escala del max zoom
      camS = Math.min(2.0, VIEW_RANGE / Math.max(0.01, ZOOM_RANGE));

      // Progreso horizontal (0..1) basado en X actual
      const prog = clamp(((sim.x ?? 0) / W), 0, 1);
      const panRangeX = (camS - 1) * W;
      // Compensa el centrado del scale(): inicio:+pan/2, final:-pan/2
      camPanX = (0.5 - prog) * panRangeX;

      // Centro de vista vertical: sigue el índice con suavizado MUCHO más lento ("flotante")
      zoomCenter += (sim.idx - zoomCenter) * 0.04;
      const leadMax = ZOOM_RANGE * ZOOM_LEAD_MAX;
      // El "lead" (adelanto) también se suaviza
      const targetLead = clamp(sim.idx * ZOOM_LEAD_K, -leadMax, leadMax);
      sim._currentLead = sim._currentLead || 0;
      sim._currentLead += (targetLead - sim._currentLead) * 0.05;

      camViewCenter = zoomCenter - sim._currentLead; // idx>0 => bola queda más arriba

      // Convertimos el centro de vista (en unidades de índice) a coordenada mundo (px)
      const worldCenterY = ((VIEW_RANGE - camViewCenter) / (2 * VIEW_RANGE)) * H;
      const panRangeY = (camS - 1) * H;
      const panYraw = (cy - worldCenterY) * camS;
      camPanY = clamp(panYraw, -panRangeY / 2, panRangeY / 2);

      pv.style.transformOrigin = '50% 50%';
      pv.style.transform = `translate(${camPanX.toFixed(1)}px, ${camPanY.toFixed(1)}px) scale(${camS.toFixed(3)})`;
    }

    function toggleZoom() {
      zoomOn = !zoomOn;
      const b = document.getElementById('btn-zoom');
      if (b) b.classList.toggle('on', zoomOn);

      zoomCenter = sim.idx;
      zoomCenterUI = sim.idx;

      applyBackgroundZoom();
      renderAxisLabels();

      showToast(zoomOn ? `🔎 ZOOM (±${ZOOM_RANGE})` : '🔎 ZOOM OFF');
    }

    let _lastAxisT = 0;
    function tickAxis(nowMs) {
      if (!zoomOn) return;
      if (nowMs - _lastAxisT < 70) return; // ~14fps
      _lastAxisT = nowMs;
      renderAxisLabels();
    }

    function showErr(modalId, msg) {
      const e = document.getElementById(modalId + '-err');
      if (e) { e.innerText = msg; e.style.display = 'block'; }
    }
    function setLoading(btnId, loading) {
      const b = document.getElementById(btnId);
      if (!b) return;
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spin"></span> Cargando...' : (btnId === 'login-btn' ? 'Entrar' : 'Empezar a operar');
    }
    function hm(id) { document.getElementById(id).classList.add('h'); }

    // ── EMPTY STATE & AUTO LOAD ──
    function setNoMatchState(sport, nextTime) {
      document.getElementById('team-home').innerText = 'NO HAY PARTIDOS';
      document.getElementById('team-away').innerText = 'EN DIRECTO';
      document.getElementById('live-score').innerText = '-';
      document.getElementById('match-time').innerText = nextTime ? `Próximo: ${nextTime}` : (sport === 'tennis' ? 'Buscando tenis...' : 'Buscando fútbol...');
      document.getElementById('tennis-inline-points').style.display = (sport === 'tennis') ? 'block' : 'none';
      document.getElementById('lbl-home').innerText = sport === 'tennis' ? 'Jugador 1' : 'Visitante';
      document.getElementById('lbl-away').innerText = sport === 'tennis' ? 'Jugador 2' : 'Local';

      sim.active = true;
      sim.idx = 0;
      sim.targetIdx = 0;
      const iv = document.getElementById('idx');
      iv.innerText = 'ESPERANDO';
      iv.style.color = 'rgba(255,255,255,0.4)';
      iv.style.textShadow = 'none';

      // Center ball
      const pitch = document.getElementById('pitch');
      if (pitch) {
        const W = pitch.clientWidth, H = pitch.clientHeight;
        sim.x = W / 2;
        const yPos = H / 2;
        document.getElementById('ball').setAttribute('transform', `translate(${sim.x},${yPos})`);
        document.getElementById('trail').setAttribute('d', '');
      }
    }

    async function autoLoadMatch(sport) {
      const today = new Date().toISOString().split('T')[0];
      const sportStr = sport === 'tennis' ? 'Tennis' : 'Soccer';
      setNoMatchState(sport);

      try {
        let r = await fetch(`${SPORTSDB_BASE}/eventsday.php?d=${today}&s=${sportStr}`);
        let d = await r.json();
        let events = d.events || [];

        if (events.length > 0) {
          // Try to find a live event
          const liveEvent = events.find(e => {
            const st = (e.strStatus || '').toLowerCase();
            return st === 'in progress' || st === '1h' || st === '2h' || st === 'ht' || e.intElapsed > 0;
          });

          if (liveEvent) {
            selectEvent({
              home: liveEvent.strHomeTeam, away: liveEvent.strAwayTeam,
              homeStrength: 0.5,
              sport, idEvent: liveEvent.idEvent,
              idHomeTeam: liveEvent.idHomeTeam, idAwayTeam: liveEvent.idAwayTeam, idLeague: liveEvent.idLeague, season: liveEvent.strSeason
            });
            return;
          }

          // No live events, find the next upcoming
          const nowStr = new Date().toTimeString().slice(0, 5); // "HH:MM"
          const upcoming = events.filter(e => (e.strTime || '').slice(0, 5) >= nowStr)
            .sort((a, b) => (a.strTime || '').localeCompare(b.strTime || ''));

          if (upcoming.length > 0) {
            setNoMatchState(sport, (upcoming[0].strTime || '').slice(0, 5));
          } else {
            setNoMatchState(sport, 'Mañana');
          }
        } else {
          setNoMatchState(sport, 'Sin eventos');
        }
      } catch (e) {
        setNoMatchState(sport, '---');
      }
    }


    // ─────────────────────────────────────────────────────────
    // ✅ FIX: enlaza botones por JS (por si el navegador/CSP ignora onclick inline)
    // Esto hace que los botones respondan SIEMPRE mientras el script esté cargado.
    // ─────────────────────────────────────────────────────────
    function bindUI() {
      try {
        const snd = document.getElementById('btn-snd');
        if (snd) snd.onclick = (e) => { e.preventDefault(); try { toggleSound(); } catch (_) { } };
        const zoom = document.getElementById('btn-zoom');
        if (zoom) zoom.onclick = (e) => { e.preventDefault(); try { toggleZoom(); } catch (_) { } };
        const plus = document.querySelector('.btn-plus');
        if (plus) plus.onclick = (e) => { e.preventDefault(); try { showEvents(); } catch (_) { } };
        const av = document.querySelector('.avatar');
        if (av) av.onclick = (e) => { e.preventDefault(); try { handleAvatarClick(); } catch (_) { } };

        // Tabs deporte
        const tabs = document.querySelectorAll('#topbar .stab');
        if (tabs && tabs.length >= 2) {
          tabs[0].onclick = (e) => { e.preventDefault(); try { switchSport('football', tabs[0]); } catch (_) { } };
          tabs[1].onclick = (e) => { e.preventDefault(); try { switchSport('tennis', tabs[1]); } catch (_) { } };
        }

        // Action bar
        const buy = document.querySelector('#abar .btn-b');
        if (buy) buy.onclick = (e) => { e.preventDefault(); try { openPos('BUY'); } catch (_) { } };
        const sell = document.querySelector('#abar .btn-s');
        if (sell) sell.onclick = (e) => { e.preventDefault(); try { openPos('SELL'); } catch (_) { } };
        const exit = document.getElementById('btn-exit');
        if (exit) exit.onclick = (e) => { e.preventDefault(); try { closePos(); } catch (_) { } };

        // Modal: cerrar tocando fondo ya está en onload, pero reforzamos
        document.querySelectorAll('.mback').forEach(el => {
          el.addEventListener('click', ev => { if (ev.target === el) el.classList.add('h'); });
        });

        // Indicador minúsculo de “JS OK” (debug)
        if (!document.getElementById('js-ok-dot')) {
          const d = document.createElement('div');
          d.id = 'js-ok-dot';
          d.style.cssText = 'position:fixed;left:6px;bottom:6px;width:8px;height:8px;border-radius:50%;background:#4ade80;opacity:.85;z-index:9999;';
          d.title = 'JS OK';
          document.body.appendChild(d);
        }
      } catch (e) { }
    }

    // ── INIT ───────────────────────────────────────────
    // Si el documento ya está cargado, enlaza UI inmediatamente
    try { if (document.readyState === 'interactive' || document.readyState === 'complete') bindUI(); } catch (e) { }

    window.onload = async () => {
      bindUI();
      applyPitchTheme('football');
      setNoMatchState('football');
      // Por defecto: próximo partido de fútbol (EPL/LaLiga). Sin banner al abrir.
      autoPickDefaultFootball().then(ok => { if (!ok) autoLoadMatch('football'); });
      document.querySelectorAll('.mback').forEach(el => {
        el.addEventListener('click', e => { if (e.target === el) el.classList.add('h'); });
      });
      // Kick animation loop
      sim.active = true;
      if (afId) cancelAnimationFrame(afId);
      afId = requestAnimationFrame(frame);
    };


    try {
      window.switchSport = switchSport;
      window.showEvents = showEvents;
      window.handleAvatarClick = handleAvatarClick;
      window.loadEvents = loadEvents;
      window.selectEvent = selectEvent;
      window.selectEventFromP = selectEventFromP;
      window.toggleSound = toggleSound;
      window.toggleZoom = toggleZoom;
      window.openPos = openPos;
      window.closePos = closePos;
      window.hm = hm;
    } catch (e) { }


    // MOBILE_AVATAR_FORCE_AUTH: fuerza apertura del login desde el avatar (móvil)
    (function () {
      function onAvatar(ev) {
        try {
          const t = ev.target;
          const av = t && t.closest ? t.closest('.avatar') : null;
          if (!av) return;
          ev.preventDefault();
          ev.stopPropagation();
          try {
            if (typeof user !== 'undefined' && user) showProfile();
            else showAuth('login');
          } catch (_) { }
        } catch (_) { }
      }
      document.addEventListener('pointerdown', onAvatar, true);
      document.addEventListener('touchstart', onAvatar, { capture: true, passive: false });
      document.addEventListener('click', onAvatar, true);
    })();

  </script>
