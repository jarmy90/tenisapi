<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>BOLITA – Dominio en Vivo · </title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // MOBILE_AVATAR_FORCE_AUTH: fuerza apertura del login desde el avatar (móvil)
    (function () {
      function onAvatar(ev) {
        try {
          const t = ev.target;
          const av = t && t.closest ? t.closest('.avatar') : null;
          if (!av) return;
          ev.preventDefault();
          ev.stopPropagation();
          try {
            if (typeof user !== 'undefined' && user) showProfile();
            else showAuth('login');
          } catch (_) { }
        } catch (_) { }
      }
      document.addEventListener('pointerdown', onAvatar, true);
      document.addEventListener('touchstart', onAvatar, { capture: true, passive: false });
      document.addEventListener('click', onAvatar, true);
    })();
  </script>
  <style>

    /* ── MODALS ── */

    /* ── TENIS: sin panel extra arriba; puntos inline y juegos/sets dentro de la pista ── */


    #scoreboard.tennis .live-row,

    #tennis-setsbox {

    .tsetcol .r1,
    .tsetcol .r2 {
      height: 22px;
      display: flex;

    @media(max-height:420px) and (orientation:landscape) {

    /* ── ZOOM VISUAL: contenedor escalable del fondo (no bloquea clicks) ── */

<body>
  <div id="app">

    <!-- PITCH -->

  <div id="m-events" class="mback h">
    <div class="mcard">

        <button class="stab on" id="ev-atab" onclick="loadEvents('all',this)">⭐ Todos</button>
        <button class="stab" id="ev-ftab" onclick="loadEvents('football',this)">⚽ Fútbol</button>
        <button class="stab" id="ev-ttab" onclick="loadEvents('tennis',this)">🎾 Tenis</button>

  <script>
    // ════════════════════════════════════════════════════
    // ⚙️  CONFIGURACIÓN — Pon aquí tus credenciales
    // ════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://barizxfrlzycngtlpkcr.supabase.co';  // ✅ Configurado
    const SUPABASE_KEY = 'sb_publishable_f7h37G37BTFS4OaDrVpZLg_qtbS2877';  // ✅ Configurado
    // ════════════════════════════════════════════════════

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ✅ Rehidrata sesión en arranque (móvil/Pages)
    async function refreshAuthState() {
      try {
        const { data, error } = await sb.auth.getSession();
        if (error) throw error;
        const sess = data?.session || null;
        if (sess?.user) {
          user = sess.user;
          await loadProfile();
          updateTopbar();
          return true;
        }
      } catch (e) { }
      return false;
    }


    // Tras login (SIGNED_IN), fuerza recarga a URL canónica con cache-bust.
    // Esto evita que el redirect OAuth caiga en /index.html?code=... y Cloudflare sirva otra versión cacheada.
    function canonicalizeAfterOAuth() {
      try {
        const url = new URL(window.location.href);
        const hasCode = url.searchParams.has('code') || url.searchParams.has('error');
        const hasHash = (url.hash || '').includes('access_token') || (url.hash || '').includes('code=');
        if (!(hasCode || hasHash)) return false;
        const clean = url.origin + url.pathname;
        window.location.replace(clean + '?v=' + Date.now());
        return true;
      } catch (e) { return false; }
    }

    // ── STATE ──────────────────────────────────────────
    let user = null;        // Supabase User object
    let profile = null;     // { id, username, balance, avatar_url }
    let tradeHistory = [];

    let match = {
      home: '', away: '', homeScore: 0, awayScore: 0,
      homeStrength: .5, sport: 'football',
      matchMins: 0, idEvent: null
    };
    let sim = {
      idx: 0, x: 0, startTime: null, duration: 5400000, pts: [], ballAngle: 0, active: false, targetIdx: 0,
      v: 0, lastT: 0,
      testMode: false, testStart: 0, testDuration: 0,
      tennisTestMode: false, tennisTestStart: 0, tennisTestDuration: 0, tennisProg: 0,
      freeze: false, freezeIdx: 0,
      tennis: null
    };
    let pos = null;
    let afId = null;
    let pollInterval = null;
    const EVENTS_CACHE = {};
    const EVENTS_CACHE_TTL_MS = 10 * 60 * 1000;
    let eventsLoadNonce = 0;

    let selectNonce = 0; // cancela selects async antiguos


    // ── SUPABASE AUTH ──────────────────────────────────
    sb.auth.onAuthStateChange(async (event, session) => {
      // ✅ Si acabamos de hacer login, recarga a URL canónica (evita versión cacheada con ?code=...)
      if (event === 'SIGNED_IN' && session?.user) {
        if (canonicalizeAfterOAuth()) return;
      }

      if (session?.user) {
        user = session.user;
        await loadProfile();
        updateTopbar();
        hm('m-auth');
      } else {
        user = null; profile = null; pos = null;
        document.getElementById('btn-exit').classList.remove('open');
        updateTopbar();
      }
    });

    async function loadProfile() {
      const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
      if (data) {
        profile = data;
      } else {
        // fallback if trigger didn't run
        profile = { id: user.id, username: user.user_metadata?.full_name || user.email.split('@')[0], balance: 1000, avatar_url: user.user_metadata?.avatar_url };
        await sb.from('profiles').upsert(profile);
      }
    }

    async function loadHistory() {
      const { data } = await sb.from('trades').select('*').eq('user_id', user.id).order('created_at', { ascending: false }).limit(30);
      tradeHistory = data || [];
    }

    async function handleAvatarClick() {
      if (user) { showProfile(); return; }
      const ok = await refreshAuthState();
      if (ok) showProfile();
      else showAuth('login');
    }
    // ── GOOGLE LOGIN ───────────────────────────────────
    async function loginWithGoogle() {
      // ✅ Mobile-safe: navegación directa (Brave/Android a veces bloquea el flujo si no es redirect)
      try {
        const redirectTo = window.location.origin + window.location.pathname;
        const url = SUPABASE_URL.replace(/\/$/, '') + '/auth/v1/authorize?provider=google&redirect_to=' + encodeURIComponent(redirectTo) + '&prompt=consent';
        window.location.href = url;
      } catch (e) {
        try { window.location.href = '/'; } catch (_) { }
      }
    }


    // ── EMAIL AUTH ─────────────────────────────────────
    async function loginEmail() {
      const email = document.getElementById('a-email')?.value?.trim();
      const pass = document.getElementById('a-pass')?.value;
      if (!email || !pass) { showErr('m-auth', 'Rellena todos los campos'); return; }
      setLoading('login-btn', true);
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      setLoading('login-btn', false);
      if (error) showErr('m-auth', error.message === 'Invalid login credentials' ? 'Email o contraseña incorrectos' : error.message);
    }

    async function registerEmail() {
      const uname = document.getElementById('a-uname')?.value?.trim();
      const email = document.getElementById('a-email')?.value?.trim();
      const pass = document.getElementById('a-pass')?.value;
      if (!uname || !email || !pass) { showErr('m-auth', 'Rellena todos los campos'); return; }
      if (pass.length < 6) { showErr('m-auth', 'Contraseña mínimo 6 caracteres'); return; }
      setLoading('reg-btn', true);
      const { error } = await sb.auth.signUp({
        email, password: pass,
        options: { data: { full_name: uname } }
      });
      setLoading('reg-btn', false);
      if (error) { showErr('m-auth', error.message); return; }
      showToast('✅ Revisa tu email para confirmar');
      hm('m-auth');
    }

    async function logout() {
      try {
        await sb.auth.signOut({ scope: 'local' });
      } catch (e) {
        try { console.warn('signOut failed', e); } catch (_) { }
      } finally {
        user = null; profile = null; pos = null;
        try { document.getElementById('btn-exit').classList.remove('open'); } catch (e) { }
        try { updateTopbar(); } catch (e) { }
        try { hm('m-profile'); } catch (e) { }
        try { hm('m-auth'); } catch (e) { }
        try { showToast('✅ Sesión cerrada'); } catch (e) { }
      }
    }
    // ── AUTH MODAL RENDER ─────────────────────────────
    function showAuth(mode = 'login') {
      document.getElementById('m-auth').classList.remove('h');
      renderAuth(mode);
    }

    function renderAuth(mode) {
      const c = document.getElementById('m-auth-c');
      const googleSVG = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.33 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.67 14.62 48 24 48z"/></svg>`;

      if (mode === 'login') {
        c.innerHTML = `
      <h2>Bienvenido</h2>
      <p class="sub">Entra para guardar tus operaciones y competir en el ranking</p>
      <button class="mbtn g" onclick="loginWithGoogle()">${googleSVG} Continuar con Google</button>
      <div class="sep">o con email</div>
      <p class="err" id="m-auth-err"></p>
      <input class="mi" type="email" id="a-email" placeholder="Email">
      <input class="mi" type="password" id="a-pass" placeholder="Contraseña">
      <button class="mbtn w" id="login-btn" onclick="loginEmail()">Entrar</button>
      <p style="text-align:center;margin-top:12px;font-size:11px;color:rgba(255,255,255,.4)">
        ¿No tienes cuenta? <span style="color:#FFD400;cursor:pointer;font-weight:700" onclick="renderAuth('register')">Regístrate gratis</span>
      </p>`;
      } else {
        c.innerHTML = `
      <h2>Únete al Juego</h2>
      <p class="sub">Crea tu cuenta y recibe 1.000 créditos gratis</p>
      <button class="mbtn g" onclick="loginWithGoogle()">${googleSVG} Registrarse con Google</button>
      <div class="sep">o con email</div>
      <p class="err" id="m-auth-err"></p>
      <input class="mi" type="text" id="a-uname" placeholder="Nombre de usuario">
      <input class="mi" type="email" id="a-email" placeholder="Email">
      <input class="mi" type="password" id="a-pass" placeholder="Contraseña (mín. 6 caracteres)">

    function playSound(type) {
      if (!soundOn) return;
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;

      if (type === 'goal') {
        // Crowd roar: burst of noise sweeping up
        const buf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.min(1, i / (ctx.sampleRate * .1)) * Math.max(0, 1 - i / (ctx.sampleRate * 1.4));
        const src = ctx.createBufferSource(); src.buffer = buf;
        const gain = ctx.createGain(); gain.gain.setValueAtTime(0.5, now);
        const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 800; filter.Q.value = 0.5;
        src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        src.start();
        // Add whistle
        const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(2200, now); osc.frequency.linearRampToValueAtTime(2600, now + .15);
        const wg = ctx.createGain(); wg.gain.setValueAtTime(0.2, now); wg.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.connect(wg); wg.connect(ctx.destination); osc.start(); osc.stop(now + 0.5);

      } else if (type === 'whistle') {
        // Short whistle
        const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(1800, now); osc.frequency.linearRampToValueAtTime(2000, now + .1);
        const g = ctx.createGain(); g.gain.setValueAtTime(0.25, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(now + 0.35);

      } else if (type === 'kick') {
        // Ball kick: short thud
        const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(40, now + .08);
        const g = ctx.createGain(); g.gain.setValueAtTime(0.6, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(now + 0.12);

      } else if (type === 'card') {
        // Short descending tone
        const osc = ctx.createOscillator(); osc.type = 'triangle'; osc.frequency.setValueAtTime(600, now); osc.frequency.linearRampToValueAtTime(300, now + .25);
        const g = ctx.createGain(); g.gain.setValueAtTime(0.18, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(now + 0.3);
      }
    }

    // ── FETCH ROBUSTO (timeout + retry) ─────────────────────────────────────
    async function fetchJSON(url, { timeoutMs = 10000, retries = 2 } = {}) {
      for (let a = 0; a <= retries; a++) {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort('timeout'), timeoutMs);
        try {
          const res = await fetch(url, { signal: ctrl.signal });
          clearTimeout(t);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return await res.json();
        } catch (e) {
          clearTimeout(t);
          if (a >= retries) return null;
          await new Promise(r => setTimeout(r, 450 + a * 700));
        }
      }
      return null;
    }

    function LS_esd_to_ms(esd) {

      const mm = parseInt(s.slice(10, 12) || '0', 10);

      return new Date(Y, M, D, hh, mm, ss).getTime();

      if (t1.length !== 1 || t2.length !== 1) return false;

    async function LS_tennis_upcoming(days = 2, tz = 1) {
      // Pedimos al Worker el tenis YA filtrado (ATP/WTA Singles, previas OK)
      // LS_fetch_json devuelve null si hay error (no lanza excepción)
      const packs = await Promise.all(Array.from({ length: Math.max(1, days) }, (_, i) => {
        const q = `?days=${encodeURIComponent(String(i))}&timezone=${encodeURIComponent(String(tz))}`;
        return LS_fetch_json(`/tennis/atp-wta-singles${q}`);
      }));

      const items = [];
      for (const p of (packs || [])) {
        if (!p) continue; // null = error del Worker, lo ignoramos
        const stages = Array.isArray(p?.Stages) ? p.Stages : [];
        for (const st of stages) {
          const evs = Array.isArray(st?.Events) ? st.Events : [];
          for (const ev of evs) {
            if (!ev?.Eid) continue;
            // Doble defensa (aunque el Worker ya filtra)
            if (!LS_tennis_wanted(st, ev)) continue;
            items.push({ stage: st, ev });
          }
        }
      }

      const now = Date.now();
      const inPlay = (x) => {
        const eps = String(x?.ev?.Eps || '').toUpperCase();
        return eps.startsWith('S') || eps === 'INT.';
      };
      const timeOf = (x) => LS_esd_to_ms(x?.ev?.Esd);

      const liveFirst = items.filter(inPlay);
      const upcoming = items.filter(x => timeOf(x) >= now - 10 * 60 * 1000);
      const merged = [...liveFirst, ...upcoming];

      const uniq = []; const seen = new Set();
      for (const it of merged) {
        const id = String(it?.ev?.Eid || '');
        if (!id || seen.has(id)) continue;
        seen.add(id);
        uniq.push(it);
      }

      uniq.sort((a, b) => timeOf(a) - timeOf(b));

      // Si por timing no hay upcoming, devuelve primeros por hora
      if (!uniq.length && items.length) {
        items.sort((a, b) => timeOf(a) - timeOf(b));
        for (const it of items) {
          const id = String(it?.ev?.Eid || '');
          if (!id || seen.has(id)) continue;
          seen.add(id);
          uniq.push(it);
          if (uniq.length >= 12) break;
        }
      }

      return uniq.slice(0, 12);
    }

    // Resolver el eventId de SofaScore usando live + scheduled-events por fecha
    async function resolveSofaEventId(home, away, kickoffMs) {
      const bestFrom = (arr) => {
        const H = home, A = away;
        let best = null, bestS = 0;
        for (const e of (arr || [])) {
          const hN = e?.homeTeam?.name || e?.homeTeam?.shortName || '';
          const aN = e?.awayTeam?.name || e?.awayTeam?.shortName || '';
          const s1 = (teamMatchScore(hN, H) + teamMatchScore(aN, A)) / 2;
          const s2 = (teamMatchScore(hN, A) + teamMatchScore(aN, H)) / 2;
          let s = Math.max(s1, s2);
          if (kickoffMs && e?.startTimestamp) {
            const t = e.startTimestamp * 1000;
            const mins = Math.abs(t - kickoffMs) / 60000;
            if (mins < 180) s += 0.10;
            if (mins < 45) s += 0.12;
          }
          if (s > bestS) { bestS = s; best = e; }
        }
        return (bestS >= 0.55) ? best : null;
      };

      try {
        // 1) live
        const live = await fetchSofaJSON('/sport/tennis/events/live');
        let best = bestFrom(live?.events);
        if (best?.id) return best.id;

        // 2) scheduled-events por fecha (misma ruta que otros deportes)
        const d = new Date(kickoffMs || Date.now());
        const yyyy = d.getUTCFullYear();
        const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
        const dd = String(d.getUTCDate()).padStart(2, '0');

        const sched = await fetchSofaJSON(`/sport/tennis/scheduled-events/${dstr}`);
        best = bestFrom(sched?.events);
        if (best?.id) return best.id;

        // fallback ±1 día
        for (const off of [1, -1]) {
          const d2 = new Date(d.getTime() + off * 86400000);
          const y2 = d2.getUTCFullYear();

      return null;

    // Parse flexible: intentamos inferir sets/juegos/puntos desde /event/{id} y /incidents
    function parseTennisFromSofa(evObj, incObj) {
      const out = { hSets: 0, aSets: 0, hGames: 0, aGames: 0, hPts: 0, aPts: 0, tieBreak: false, hTB: 0, aTB: 0 };
      const ev = evObj?.event || evObj || {};
      const hs = ev?.homeScore || {};
      const as = ev?.awayScore || {};

      if (Number.isFinite(hs.current) && Number.isFinite(as.current)) {
        out.hSets = hs.current; out.aSets = as.current;
      }

      const periodsH = [hs.period1, hs.period2, hs.period3, hs.period4, hs.period5].filter(v => Number.isFinite(v));
      const periodsA = [as.period1, as.period2, as.period3, as.period4, as.period5].filter(v => Number.isFinite(v));
      if (periodsH.length && periodsA.length) {
        out.hGames = periodsH[periodsH.length - 1] || 0;
        out.aGames = periodsA[periodsA.length - 1] || 0;
        let hW = 0, aW = 0;
        for (let i = 0; i < Math.min(periodsH.length, periodsA.length); i++) {
          const gh = periodsH[i], ga = periodsA[i];
          if ((gh >= 6 || ga >= 6) && (Math.abs(gh - ga) >= 2 || (gh === 7 && ga === 6) || (ga === 7 && gh === 6))) {
            if (gh > ga) hW++; else if (ga > gh) aW++;
          }
        }
        out.hSets = Math.max(out.hSets, hW);
        out.aSets = Math.max(out.aSets, aW);
      }

      const inc = incObj?.incidents || [];
      // buscamos un incidente con score tipo "15 - 30" o "AD - 40"
      for (let i = inc.length - 1; i >= 0; i--) {
        const it = inc[i];
        const s = String(it?.score || it?.text || it?.description || '');
        const m = s.match(/(AD|A|40|30|15|0)\s*[-:]\s*(AD|A|40|30|15|0)/i);
        if (!m) continue;
        const map = (x) => { x = String(x).toUpperCase(); return (x === 'A') ? 'AD' : x; };
        const conv = (x) => { x = String(x).toUpperCase(); if (x === 'A') x = 'AD'; return (x === '0') ? 0 : (x === '15') ? 1 : (x === '30') ? 2 : (x === '40') ? 3 : (x === 'AD') ? 4 : 0; };
        out.hPts = conv(map(m[1]));
        out.aPts = conv(map(m[2]));
        break;
      }
      return out;
    }

    // (REMOVED) ymdLocal(dt) duplicada — usar ymdLocal(dtOrOffset) compat

    function ymdUTC(dt) {
      const y = dt.getUTCFullYear();
      const m = String(dt.getUTCMonth() + 1).padStart(2, '0');
      const d = String(dt.getUTCDate()).padStart(2, '0');

    async function sofaTennisLiveATP() {

    async function sofaTennisScheduledATP(dateStr) {

    async function sofaTennisUpcomingATP(days = SOFA_LIST_DAYS) {
      const now = new Date();

      // Fechas a consultar: hoy+mañana (en UTC y en LOCAL) para cubrir desfases
      const ds = new Set();
      for (let i = 0; i < Math.max(1, days); i++) {
        const d = new Date(now.getTime() + i * 86400000);
        ds.add(ymdUTC(d));
        ds.add(ymdLocal(d));
      }
      const dates = Array.from(ds);

      // Scheduled (multi-fecha)
      const packs = await Promise.all(dates.map(async (dateStr) => {
        const d = await fetchSofaJSON(`/sport/tennis/scheduled-events/${dateStr}`);
        return d?.events || [];
      }));
      const scheduledAll = packs.flat().filter(e => e && e.id);

      // Live
      const liveAllObj = await fetchSofaJSON('/sport/tennis/events/live');
      const liveAll = (liveAllObj?.events || []).filter(e => e && e.id);

      // Primero intentamos ATP/WTA
      const scheduledATP = scheduledAll.filter(sofaIsAtpWta);
      const liveATP = liveAll.filter(sofaIsAtpWta);
      let list = [...liveATP, ...scheduledATP];

      // Si no hay ATP/WTA pero sí tenis (ITF/Challenger/etc.), mostramos tenis sin filtrar
      if (!list.length && (liveAll.length || scheduledAll.length)) {
        list = [...liveAll, ...scheduledAll];
        try { showFlash(`🎾 Sin ATP/WTA ahora · mostrando otros (${Math.min(list.length, SOFA_LIST_LIMIT)})`); } catch (e) { }
      }

      // Ordena por inicio
      list.sort((a, b) => (a.startTimestamp || 0) - (b.startTimestamp || 0));

      // Reduce a “próximos” (desde ahora) + live al principio
      const nowSec = Math.floor(Date.now() / 1000);
      const liveFirst = list.filter(e => String(e?.status?.type || '').toLowerCase() === 'inprogress');
      const upcoming = list.filter(e => (e.startTimestamp || 0) >= nowSec - 600);
      const merged = [...liveFirst, ...upcoming].filter((e, i, arr) => arr.findIndex(x => x.id === e.id) === i);

      return merged;
    }

    function normalizeName(s) {
      return String(s || '')
        .toLowerCase()
        .replace(/\b(fc|cf|sc|ud|cd|ac|afc)\b/g, '')
        .replace(/[^a-z0-9]+/g, ' ')

    // ODDS → implied probability (no-vig) → índice base
    function probDiffToIdx(diff) {
      // diff en [0..1] aprox. Mapeo suave: solo súper favorito se acerca a 7
      // diff=0.15→~3 ; diff=0.25→~4.5 ; diff=0.35→~5.5
      return clamp(7 * Math.tanh(3.0 * diff), 0, 7);
    }
    // ODDS → implied probability (no-vig) → índice base (SUAVIZADO)
    function oddsToIdx(oHome, oDraw, oAway) {
      const oh = parseFloat(oHome);
      const od = parseFloat(oDraw);
      const oa = parseFloat(oAway);
      if (!isFinite(oh) || oh <= 1 || !isFinite(oa) || oa <= 1) return 0;
      const pH = 1 / oh;
      const pD = (isFinite(od) && od > 1) ? 1 / od : 0;
      const pA = 1 / oa;
      const s = pH + pD + pA;
      if (s <= 0) return 0;
      const nH = pH / s;
      const nA = pA / s;
      const diff = (nH - nA);
      const mag = probDiffToIdx(Math.abs(diff));
      const idx0 = (diff >= 0 ? mag : -mag);
      return clamp(idx0, -7, 7);
    }

    async function fetchOddsForMatch({ home, away, leagueId }) {
      if (!ODDS_API_KEY || ODDS_API_KEY === 'PEGAR_TU_API_KEY_AQUI') return null;
      const sportKey = (String(leagueId) === LEAGUE_EPL) ? ODDS_SPORT_EPL : (String(leagueId) === LEAGUE_LALIGA ? ODDS_SPORT_LALIGA : null);
      if (!sportKey) return null;

      // The Odds API: /v4/sports/{sport_key}/odds?regions=uk&markets=h2h&oddsFormat=decimal&apiKey=...
      const url = `${ODDS_API_BASE}/sports/${sportKey}/odds?regions=uk&markets=h2h&oddsFormat=decimal&apiKey=${encodeURIComponent(ODDS_API_KEY)}`;
      const r = await fetch(url);
      if (!r.ok) return null;
      const games = await r.json();

      const H = normalizeName(home);
      const A = normalizeName(away);

      const g = (games || []).find(x => {
        const h = normalizeName(x.home_team);
        const a = normalizeName(x.away_team);
        return (h === H && a === A) || (h === A && a === H);
      });
      if (!g) return null;

      const bm = (g.bookmakers || [])[0];
      if (!bm) return null;
      const market = (bm.markets || []).find(m => m.key === 'h2h');
      if (!market) return null;

      const out = market.outcomes || [];
      let oh = null, od = null, oa = null;
      for (const o of out) {
        const nm = normalizeName(o.name);
        if (nm === 'draw') od = o.price;
        else if (nm === H) oh = o.price;
        else if (nm === A) oa = o.price;
      }
      if (oh == null || oa == null) return null;
      return { oh, od, oa, commence_time: g.commence_time };
    }

    function computeKickoffMs(data) {
      if (data && data.commence_time) {

      const tm = (data?.strTime || '00:00:00').slice(0, 8);
      if (!d) return null;
      const t2 = Date.parse(`${d}T${tm}Z`);
      return isFinite(t2) ? t2 : null;
    }

    async function fetchLastEvents(teamId) {
      // TheSportsDB: /eventslast.php?id=TEAM_ID
      const r = await fetch(`${SPORTSDB_BASE}/eventslast.php?id=${teamId}`);
      const d = await r.json();
      return d.results || d.events || [];
    }

    function formScore(teamId, events) {
      // Calcula puntos (W=3,D=1,L=0) + un pequeño ajuste por goal-diff
      let pts = 0, gd = 0, n = 0;
      for (const e of (events || [])) {
        const hs = parseInt(e.intHomeScore);
        const as = parseInt(e.intAwayScore);
        if (!Number.isFinite(hs) || !Number.isFinite(as)) continue;
        const isHome = String(e.idHomeTeam) === String(teamId);
        const gf = isHome ? hs : as;
        const ga = isHome ? as : hs;
        gd += (gf - ga);
        if (gf > ga) pts += 3;
        else if (gf === ga) pts += 1;
        n++;
        if (n >= 5) break;
      }
      return pts + 0.12 * gd;
    }

    function logistic(x) { return 1 / (1 + Math.exp(-x)); }

    async function estimateHomeStrengthFromForm(homeTeamId, awayTeamId) {
      // Devuelve probabilidad aproximada de que el HOME sea más fuerte (0..1)
      const [hEv, aEv] = await Promise.all([
        fetchLastEvents(homeTeamId),
        fetchLastEvents(awayTeamId)
      ]);
      const h = formScore(homeTeamId, hEv);
      const a = formScore(awayTeamId, aEv);
      const diff = h - a;
      // Escala: diff ~ [-15..+15] -> logistic suave
      const pHome = logistic(diff / 3.5);
      return clamp(pHome, 0.05, 0.95);
    }

    // ── PN (Dominance Index) relativo al equipo de la DERECHA ─────────────
    function calcPN(homeScore, awayScore, progressFrac) {
      const rightKey = match.display?.rightKey || 'home';
      const rightStrength = keyStrength(rightKey);
      const bias = (rightStrength - 0.5) * 6; // -3..+3
      const timeFactor = 1 + progressFrac * 0.8;
      const rs = keyScore(rightKey, homeScore, awayScore);
      const ls = (rightKey === 'home') ? awayScore : homeScore;
      const scorePN = (rs - ls) * 2.2 * timeFactor;
      return clamp(bias + scorePN, -6.0, 6.0);
    }

    // Tennis PN: mantenemos lógica pero referida al equipo de la derecha
    function calcTennisPN(hSets, aSets, hGames, aGames, hPts, aPts, tieBreak = false) {
      // Tenis: set ~±4, el resto solo variación suave
      const rightKey = match.display?.rightKey || 'home';
      const rightStrength = keyStrength(rightKey);
      const bias = (rightStrength - 0.5) * 2.0;

      const rSets = (rightKey === 'home') ? hSets : aSets;
      const lSets = (rightKey === 'home') ? aSets : hSets;
      const rGames = (rightKey === 'home') ? hGames : aGames;
      const lGames = (rightKey === 'home') ? aGames : hGames;

      // Reducidas drásticamente las amplitudes para evitar saltos verticales extremos
      const setDiff = (rSets - lSets) * 1.8;
      const gameDiff = (rGames - lGames) * 0.25;

      const pDiff = (rightKey === 'home') ? (hPts - aPts) : (aPts - hPts);
      const pointFactor = tieBreak ? 0.05 : 0.035;
      const pointPN = clamp(pDiff, -3, 3) * pointFactor;

      const basePN = clamp(bias + setDiff + gameDiff + pointPN, -6.0, 6.0);

      return basePN;
    }

    function runFootballSim() {
      // Test virtual fútbol: tiempo continuo (evita escalones)
      match.matchMins = 0;
      sim.testMode = true;
      sim.testStart = performance.now();
      sim.testDuration = 36000; // 36s = 90min acelerados
      sim.freeze = false;

      if (simTestTimer) clearInterval(simTestTimer);
      simTestTimer = setInterval(() => {
        // Eventos aleatorios
        const rnd = Math.random();
        if (rnd < 0.08) {
          const isHome = Math.random() < match.homeStrength;
          const eventType = Math.random();

          if (eventType < 0.4) {
            // Gol
            if (isHome) { match.homeScore++; playSound('goal'); pushFeed(`⚽ GOL ${(isHome ? match.home : match.away) || ''}`.trim(), 'goal', Math.floor(match.matchMins)); }
            else { match.awayScore++; playSound('goal'); pushFeed(`⚽ GOL ${(isHome ? match.home : match.away) || ''}`.trim(), 'goal', Math.floor(match.matchMins)); }
            renderScoreboard(match.homeScore, match.awayScore);
            sim.v += (isHome ? +1.0 : -1.0);
          } else if (eventType < 0.6) {
            // Córner
            if (isHome) { playSound('kick'); pushFeed(`🚩 Córner ${(isHome ? match.home : match.away) || ''}`.trim(), '', Math.floor(match.matchMins)); match.homeStrength += 0.05; }
            else { playSound('kick'); pushFeed(`🚩 Córner ${(isHome ? match.home : match.away) || ''}`.trim(), '', Math.floor(match.matchMins)); match.homeStrength -= 0.05; }
            sim.v += (isHome ? +0.45 : -0.45);
          } else if (eventType < 0.8) {
            // Tarjeta
            if (isHome) { playSound('card'); pushFeed(`🟨 Amarilla ${(isHome ? match.home : match.away) || ''}`.trim(), 'card', Math.floor(match.matchMins)); match.homeStrength -= 0.02; }
            else { playSound('card'); pushFeed(`🟨 Amarilla ${(isHome ? match.home : match.away) || ''}`.trim(), 'card', Math.floor(match.matchMins)); match.homeStrength += 0.02; }
            sim.v += (isHome ? -0.30 : +0.30);
          } else {
            // Penalti / peligro
            if (isHome) { playSound('whistle'); pushFeed(`⚠️ Peligro ${(isHome ? match.home : match.away) || ''}`.trim(), 'red', Math.floor(match.matchMins)); match.homeStrength += 0.15; }
            else { playSound('whistle'); pushFeed(`⚠️ Peligro ${(isHome ? match.home : match.away) || ''}`.trim(), 'red', Math.floor(match.matchMins)); match.homeStrength -= 0.15; }
            sim.v += (isHome ? +0.75 : -0.75);
          }
        }

        match.homeStrength = clamp(match.homeStrength, 0.2, 0.8);
        const progressFrac = clamp((performance.now() - sim.testStart) / sim.testDuration, 0, 1);
        sim.targetIdx = calcPN(match.homeScore, match.awayScore, progressFrac);

        // Fin
        if ((performance.now() - sim.testStart) >= sim.testDuration) {
          clearInterval(simTestTimer);
          showFlash('⏱️ Test Terminado');

          // Congelar final: si hay Madrid, Madrid es positivo; si no, usa rightKey
          let posKey = null;
          const hn = (match.home || '').toLowerCase();
          const an = (match.away || '').toLowerCase();
          if (hn.includes('madrid')) posKey = 'home';
          else if (an.includes('madrid')) posKey = 'away';
          else posKey = (match.display?.rightKey || 'home');

          const ps = keyScore(posKey, match.homeScore, match.awayScore);
          const os = (posKey === 'home') ? match.awayScore : match.homeScore;
          const diff = ps - os;
          const finalIdx = diff === 0 ? 0 : (diff > 0 ? 10 : -10);

          sim.freezeIdx = finalIdx;
          sim.idx = finalIdx;
          sim.targetIdx = finalIdx;
          sim.v = 0;
          sim.freeze = true;
          sim.testMode = false;

          if (pos) closePos(true);
        }
      }, 800);
    }

    function runTennisSim() {
      // Simulación tenis con marcador real (0/15/30/40, Iguales, Ventaja) + tablero tipo TV
      match.matchMins = 0;
      match.homeScore = 0; match.awayScore = 0; // sets

      const t = sim.tennis = {

      };

      const p1 = match.home || 'Jugador 1';
      const p2 = match.away || 'Jugador 2';
      const elInlinePts = document.getElementById('tennis-inline-points');
      const elSetsBox = document.getElementById('tennis-setsbox');
      function ptsLabel(h, a) {
        const map = ['0', '15', '30', '40'];
        if (t.tieBreak) return `TB ${t.hTB}-${t.aTB}`;
        if (h >= 3 && a >= 3) {
          if (h === a) return 'IGUALES';
          if (h === a + 1) return `VENTAJA ${p1}`;
          if (a === h + 1) return `VENTAJA ${p2}`;
        }
        return `${map[Math.min(h, 3)]}-${map[Math.min(a, 3)]}`;
      }


      function updateTennisBoard() {
        const lK = match.display?.leftKey || 'away';
        const rK = match.display?.rightKey || 'home';
        const byKey = (k, h, a) => (k === 'home') ? h : a;

        const lGames = byKey(lK, t.hGames, t.aGames), rGames = byKey(rK, t.hGames, t.aGames);
        const lPts = byKey(lK, t.hPts, t.aPts), rPts = byKey(rK, t.hPts, t.aPts);
        const lTB = byKey(lK, t.hTB, t.aTB), rTB = byKey(rK, t.hTB, t.aTB);

        if (elInlinePts) elInlinePts.style.display = 'block';
        if (elInlinePts) elInlinePts.innerText = ptsLabel(lPts, rPts, lTB, rTB);

        if (elSetsBox) {
          elSetsBox.style.display = 'flex';
          const cols = [];
          if (t.setScores && t.setScores.length) {
            for (const sc of t.setScores) {
              const top = byKey(lK, sc.h, sc.a);
              const bot = byKey(rK, sc.h, sc.a);
              cols.push(`<div class="tsetcol"><div class="r1">${top}</div><div class="r2">${bot}</div></div>`);
            }
          }
          cols.push(`<div class="tsetcol current"><div class="r1">${lGames}</div><div class="r2">${rGames}</div></div>`);
          elSetsBox.innerHTML = cols.join('');
        }
      }
      function updateTennisProgress() {
        // Progreso por juegos (evita que la bola llegue al final demasiado pronto)
        const hist = t.setGamesHistory.reduce((a, b) => a + b, 0);
        const curGames = t.hGames + t.aGames;
        let partial = 0;
        if (t.tieBreak) partial = clamp((t.hTB + t.aTB) / 14, 0, 1);
        else partial = clamp((t.hPts + t.aPts) / 8, 0, 1);

        const gamesPlayed = hist + curGames + partial;
        const setsToWin = 2;
        const remSets = Math.max(0, setsToWin - Math.max(t.hSets, t.aSets));
        const minRemainingGames = remSets * 6;
        const baseTotal = 24; // estimación inicial
        const expectedTotal = Math.max(baseTotal, gamesPlayed + minRemainingGames);
        sim.tennisProg = clamp(gamesPlayed / Math.max(1, expectedTotal), 0, 0.995);
      }

      function maybeFeed(kind, winnerIsHome) {
        // En tenis: banners MUY selectivos y coherentes. Solo: ACE, Doble falta y Winner (muy raro)
        const now = performance.now();
        if (now - t.lastFeed < 5200) return; // mínimo ~5.2s entre banners

        const who = winnerIsHome ? p1 : p2;
        let msg = '';
        if (kind === 'ace') msg = `🎯 ACE ${who}`;
        else if (kind === 'df') msg = `🤦 Doble falta ${who}`;
        else if (kind === 'winner') msg = `⚡ Winner ${who}`;
        else return;

        const p = (kind === 'winner') ? 0.18 : 0.45;
        if (Math.random() > p) return;

        pushFeed(msg, '', Math.floor(match.matchMins));
        t.lastFeed = now;
      }

      function endMatchFreeze() {
        // Congela y lleva X al final
        sim.tennisProg = 1;
        const rightKey = match.display?.rightKey || 'home';
        const rs = keyScore(rightKey, t.hSets, t.aSets);
        const ls = (rightKey === 'home') ? t.aSets : t.hSets;
        const diff = rs - ls;
        const finalIdx = diff === 0 ? 0 : (diff > 0 ? 10 : -10);
        sim.freezeIdx = finalIdx;
        sim.idx = finalIdx;
        sim.targetIdx = finalIdx;
        sim.v = 0;
        sim.freeze = true;
        sim.tennisTestMode = false;
        showFlash('⏱️ Test Tenis Terminado');
      }


      function winSet(homeWon) {
        // Guarda resultado del set terminado (ej: 6/4 o 7/6 si tie-break)
        let hFinal = t.hGames, aFinal = t.aGames;
        if (t.tieBreak) {
          if (homeWon) { hFinal = 7; aFinal = 6; }
          else { hFinal = 6; aFinal = 7; }
        }
        t.setScores.push({ h: hFinal, a: aFinal });
        if (homeWon) t.hSets++; else t.aSets++;
        // (tenis) sin banner de set: prioridad al resultado
        t.setGamesHistory.push(t.hGames + t.aGames + (t.tieBreak ? 1 : 0));
        t.set++;
        t.hGames = 0; t.aGames = 0;
        t.hPts = 0; t.aPts = 0;
        t.tieBreak = false; t.hTB = 0; t.aTB = 0;
      }

      function winGame(homeWon) {
        if (homeWon) t.hGames++; else t.aGames++;
        t.hPts = 0; t.aPts = 0;

        // Tie-break si 6-6
        if (t.hGames === 6 && t.aGames === 6) {
          t.tieBreak = true; t.hTB = 0; t.aTB = 0;
        }

        // Set ganado (sin tie-break)
        if (!t.tieBreak) {
          const gDiff = t.hGames - t.aGames;
          if ((t.hGames >= 6 || t.aGames >= 6) && Math.abs(gDiff) >= 2) {
            winSet(gDiff > 0);
          }
        }
      }

      function point(homeWon) {
        if (t.tieBreak) {
          if (homeWon) t.hTB++; else t.aTB++;
          if ((t.hTB >= 7 || t.aTB >= 7) && Math.abs(t.hTB - t.aTB) >= 2) {
            winSet(t.hTB > t.aTB);
          }
        } else {
          if (homeWon) t.hPts++; else t.aPts++;
          if ((t.hPts >= 4 || t.aPts >= 4) && Math.abs(t.hPts - t.aPts) >= 2) {
            winGame(t.hPts > t.aPts);
          }
        }
      }

      // UI inicial
      updateTennisProgress();
      updateTennisBoard();

      if (simTestTimer) clearInterval(simTestTimer);
      simTestTimer = setInterval(() => {
        match.matchMins += 1;

        // Partido igualado: base 0.5, ligera inercia por sets
        const baseP = clamp(match.homeStrength || 0.5, 0.35, 0.65);
        const setBias = clamp((t.hSets - t.aSets) * 0.03, -0.06, 0.06);
        const pHome = clamp(baseP + setBias, 0.35, 0.65);
        const homeWinsPoint = Math.random() < pHome;

        // Evento raro (tenis): solo muy principal
        const ev = Math.random();
        if (ev < 0.028) maybeFeed('ace', homeWinsPoint);
        else if (ev < 0.040) maybeFeed('winner', homeWinsPoint);
        else if (ev < 0.062) maybeFeed('df', !homeWinsPoint);

        point(homeWinsPoint);

        // Inyectamos kinetic energy al modelo de físicas global como en fútbol
        sim.v += (homeWinsPoint ? +0.55 : -0.55);

        // Índice según sets/juegos/puntos
        sim.targetIdx = calcTennisPN(t.hSets, t.aSets, t.hGames, t.aGames, t.hPts, t.aPts, t.tieBreak);
        updateTennisProgress();
        updateTennisBoard();

        // Fin (mejor de 3): 2 sets
        if (t.hSets >= 2 || t.aSets >= 2) {
          clearInterval(simTestTimer);
          endMatchFreeze();
          if (pos) closePos(true);
        }

      }, 4200); // Ralentizado de 2800 a 4200 para dar espacio a la animación flotante de la bola
    }

    function updateTennisTimeline(currentSet, hSets, aSets) {
      const gov = document.getElementById('gov-timeline');
      if (match.sport !== 'tennis') return;

      let html = '<div style="flex:1"></div><div class="gl-row" style="padding-bottom:8px; display:flex; justify-content:flex-start; padding-left:14px; gap:12px;">';
      for (let i = 1; i <= currentSet; i++) {
        html += `<span style="color:#FFD400; font-size:10px; font-weight:900; background:rgba(0,0,0,0.4); padding:4px 10px; border-radius:6px; border:1px solid rgba(255,212,0,0.4);">SET ${i}</span>`;
      }
      html += '</div>';
      gov.innerHTML = html;
    }

    // ── API POLLING ────────────────────────────────────
    function startPolling(eventId) {
      stopPolling();
      match.idEvent = eventId;
      pollMatchData();                                  // immediate first poll
      pollInterval = setInterval(pollMatchData, 30000); // every 30 s
    }

    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      match.idEvent = null;
      stopTennisLive();
      try { stopLsPolling(); } catch (e) { } // limpia el Worker poller también
    }

    async function pollMatchData() {
      if (!match.idEvent) return;
      try {
        const r = await fetch(`${SPORTSDB_BASE}/lookupevent.php?id=${match.idEvent}`);
        const d = await r.json();
        const ev = d.events?.[0];
        if (!ev) return;

        // Parse scores
        const newHome = parseInt(ev.intHomeScore) || 0;
        const newAway = parseInt(ev.intAwayScore) || 0;

        // Detect score change
        if (newHome !== match.homeScore || newAway !== match.awayScore) {
          const didH = newHome > match.homeScore;
          const didA = newAway > match.awayScore;
          match.homeScore = newHome;
          match.awayScore = newAway;
          renderScoreboard(newHome, newAway);

          // ✅ Feed/Sonidos SOLO en fútbol (en tenis no mostramos banners tipo fútbol)
          if (match.sport === 'football') {
            if (didH) { pushFeed('⚽ GOL', 'goal', match.matchMins); playSound('goal'); showFlash('⚽ GOL!'); }
            if (didA) { pushFeed('⚽ GOL RIVAL', 'goal', match.matchMins); playSound('goal'); showFlash('⚽ GOL RIVAL!'); }
          }
        }

        // Update match time from API
        let elapsed = parseInt(ev.intElapsed) || 0;

        // ✅ FIX: Si TheSportsDB no devuelve intElapsed (=0) pero el partido ya tiene goles
        // o el kickoff ya pasó, estimamos el minuto desde kickoffMs.
        if (elapsed <= 0 && match.kickoffMs) {
          const msSinceKick = Date.now() - match.kickoffMs;
          const estMins = Math.floor(msSinceKick / 60000);
          if (estMins > 0 && estMins <= 130) {
            // Ajuste: descontamos el descanso de 15 min si ya pasó la primera mitad
            elapsed = (estMins > 60) ? Math.min(estMins - 15, 90) : Math.min(estMins, 45);
          }
        }

        if (elapsed > 0) {
          match.matchMins = elapsed;
          document.getElementById('match-time').innerText = String(elapsed).padStart(2, '0') + "'";
        }

        // Recalculate target PN
        const maxMins = match.sport === 'tennis' ? 180 : 90;
        const prog = clamp(match.matchMins / maxMins, 0, 1);
        sim.targetIdx = calcPN(match.homeScore, match.awayScore, prog);

        // Stop polling when finished
        const st = (ev.strStatus || '').toLowerCase();
        if (st === 'ft' || st === 'match finished' || st === 'aet' || st === 'pen') {
          stopPolling();
          showFlash('⏱️ Partido Terminado');
          try { setLiveBadge('FINISHED'); } catch (e) { }
          // congela posición final (más agresiva: 3 goles ~ 9.5)
          try {
            const lK = match.display?.leftKey || 'away';
            const ls = keyScore(lK, match.homeScore, match.awayScore);
            const rs = (lK === 'home') ? match.awayScore : match.homeScore;
            const diff = (ls - rs);
            const finalIdx = clamp(10 * Math.tanh(0.6 * diff), -10, 10);
            sim.freeze = true;
            sim.freezeIdx = finalIdx;
            sim.idx = finalIdx;
            sim.targetIdx = finalIdx;
            sim.v = 0;
            match.matchMins = Math.max(match.matchMins || 0, 90);
          } catch (e) { }
          if (pos) closePos(true);
        }
      } catch (e) { /* silent network error */ }
    }

    function showFlash(txt) {
      const fl = document.getElementById('evt-flash');
      fl.innerText = txt;
      fl.classList.add('show');
      setTimeout(() => fl.classList.remove('show'), 2200);
    }


    // Auto: al abrir, cargar el partido de FÚTBOL en directo (EPL/LaLiga) vía Worker.
    // Si el Worker falla, cae a TheSportsDB como fallback.
    async function autoPickDefaultFootball() {
      // ✅ Intento 1: Worker live (tiempo real, minuto exacto, score correcto)
      try {
        const d = await LS_fetch_json('/football/live-today?timezone=1');
        if (d && d.ok && Array.isArray(d.matches) && d.matches.length) {
          // Preferimos partidos live, luego próximos
          const live = d.matches.find(m => m.status === 'live' || m.status === 'halftime');
          const m = live || d.matches[0];
          const kickMs = LS_esd_to_ms(m.esd || '');
          const payload = {
            home: m.home, away: m.away,
            homeStrength: 0.5, sport: 'football',
            lsEid: m.eid, lsComp: m.comp,
            lsDate: d.date,
            kickoffMs: kickMs || null,
            // Si ya tenemos score y minuto, los pasamos directamente
            homeScore: m.score1 || 0, awayScore: m.score2 || 0,
            matchMins: m.elapsed || 0,
            lsStatus: m.status,
          };
          await selectEvent(payload);
          return true;
        }
      } catch (e) { }

      // ✅ Intento 2: TheSportsDB fallback
      try {
        const packs = await Promise.all([fetchNextLeagueEvents(LEAGUE_LALIGA), fetchNextLeagueEvents(LEAGUE_EPL)]);
        const evs = (packs.flat() || []).map(e => ({
          home: e.strHomeTeam, away: e.strAwayTeam,
          homeStrength: 0.5,
          sport: 'football',
          idEvent: e.idEvent,
          idHomeTeam: e.idHomeTeam, idAwayTeam: e.idAwayTeam,
          idLeague: e.idLeague, season: e.strSeason,
          dateEvent: e.dateEvent, strTime: e.strTime
        }));
        evs.sort((a, b) => (computeKickoffMs(a) || Number.MAX_SAFE_INTEGER) - (computeKickoffMs(b) || Number.MAX_SAFE_INTEGER));
        const now = Date.now();
        const good = evs.filter(x => {
          const k = computeKickoffMs(x) || 0;
          return !k || k >= (now - 2 * 60 * 60 * 1000);
        });
        if (good.length) {
          const live = good.find(x => Number.parseInt(x.intElapsed || 0) > 0);
          await selectEvent(live || good[0]);
          return true;
        }
      } catch (e) { }
      return false;
    }

    // ── WORKER LIVE POLLING (fútbol) ─────────────────────────────────────────
    // Sustituye a pollMatchData cuando el partido viene del Worker (tiene lsEid).
    let lsPollInterval = null;
    let lsPollEid = null;
    let lsPollDate = null;
    let lsPollCategory = 'soccer';

    function startLsPolling(eid, date, category = 'soccer') {
      stopLsPolling();
      lsPollEid = eid;
      lsPollDate = date || ymdLocal(0);
      lsPollCategory = category || 'soccer';
      pollLsMatchNow(); // primera llamada inmediata
      lsPollInterval = setInterval(pollLsMatchNow, 30000); // cada 30s
    }

    function stopLsPolling() {
      if (lsPollInterval) { clearInterval(lsPollInterval); lsPollInterval = null; }
      lsPollEid = null;
    }

    async function pollLsMatchNow() {
      if (!lsPollEid) return;
      try {
        const url = `/match/live?eid=${encodeURIComponent(lsPollEid)}&category=${lsPollCategory}&date=${lsPollDate}&timezone=1`;
        const d = await LS_fetch_json(url);
        if (!d || !d.ok || !d.event) return;
        const ev = d.event;

        // Extraer score
        const newHome = parseInt(ev?.Tr1 || '0', 10) || 0;
        const newAway = parseInt(ev?.Tr2 || '0', 10) || 0;

        // Detectar cambio de gol
        if (newHome !== match.homeScore || newAway !== match.awayScore) {
          const didH = newHome > match.homeScore;
          const didA = newAway > match.awayScore;
          match.homeScore = newHome;
          match.awayScore = newAway;
          renderScoreboard(newHome, newAway);
          if (match.sport === 'football') {
            if (didH) { pushFeed(`⚽ GOL ${match.home}`, 'goal', match.matchMins); playSound('goal'); showFlash('⚽ GOL!'); }
            if (didA) { pushFeed(`⚽ GOL ${match.away}`, 'goal', match.matchMins); playSound('goal'); showFlash('⚽ GOL RIVAL!'); }
          }
        }

        // Elapsed time desde Livescore: campo Eact o Ela
        const elapsedRaw = parseInt(ev?.Eact || ev?.Ela || '0', 10) || 0;
        const elapsed = isNaN(elapsedRaw) ? 0 : elapsedRaw;
        if (elapsed > 0) {
          match.matchMins = elapsed;
          const el = document.getElementById('match-time');
          if (el) el.innerText = String(elapsed).padStart(2, '0') + "'";
        }

        // Recalcula target PN
        const prog = clamp(match.matchMins / 90, 0, 1);
        sim.targetIdx = calcPN(match.homeScore, match.awayScore, prog);

        // Fin del partido
        const eps = String(ev?.Eps || '').toUpperCase();
        const isFinished = (eps === 'FT' || eps === 'AET' || eps === 'PEN' || eps === 'AP');
        if (isFinished) {
          stopLsPolling();
          stopPolling();
          showFlash('⏱️ Partido Terminado');
          match.matchMins = Math.max(match.matchMins || 0, 90);
          const lK = match.display?.leftKey || 'away';
          const ls = keyScore(lK, match.homeScore, match.awayScore);
          const rs = (lK === 'home') ? match.awayScore : match.homeScore;
          const diff = ls - rs;
          const finalIdx = clamp(10 * Math.tanh(0.6 * diff), -10, 10);
          sim.freeze = true; sim.freezeIdx = finalIdx; sim.idx = finalIdx;
          sim.targetIdx = finalIdx; sim.v = 0;
          if (pos) closePos(true);
        }
      } catch (e) { /* silent */ }
    }

    // Extiende stopPolling para parar el LS poller también
    const _origStopPolling = stopPolling;
    // (nota: stopPolling ya llama stopTennisLive; aquí extendemos)

    // Auto: al abrir o cambiar a TENIS, cargar el próximo partido (ATP/WTA).
    async function autoPickDefaultTennis() {
      try {
        const items = await LS_tennis_upcoming(3, 1);
        const first = (items || [])[0];
        if (first && first.stage && first.ev) {
          const payload = LS_payload(first.stage, first.ev);
          await selectEvent(payload);
          return true;
        }
      } catch (e) { }
      // Fallback: simulación de tenis si no hay partidos del Worker
      try {
        showFlash('🎾 Sin datos live · modo simulación');
        await selectEvent({ home: 'Alcaraz', away: 'Sinner', homeStrength: 0.5, sport: 'tennis' });
        return true;
      } catch (e) { }
      return false;
    }


    // ── INIT MATCH ─────────────────────────────────────
    function initMatch(m = {}) {
      // Preserva minuto si viene del partido real (intElapsed/matchMins)
      const minsIn = (m.matchMins != null) ? parseFloat(m.matchMins) : ((m.intElapsed != null) ? parseFloat(m.intElapsed) : 0);
      const mins0 = Number.isFinite(minsIn) ? minsIn : 0;

      Object.assign(match, m, {
        homeScore: m.homeScore || 0,
        awayScore: m.awayScore || 0,
        matchMins: mins0
      });
      // kickoff/idxBase
      match.kickoffMs = m.kickoffMs || null;
      match.idxBase = (m.idxBase != null) ? m.idxBase : null;
      preKickUIUpdate();


      // Defaults
      if (typeof match.homeStrength !== 'number') match.homeStrength = 0.5;
      if (!match.display) match.display = { leftKey: 'away', rightKey: 'home', favKey: 'none', eps: 0.02 };

      renderLabels();
      renderScoreboard(match.homeScore, match.awayScore);

      // Reset físico
      sim.v = 0;
      sim.lastT = 0;
      sim.freeze = false;
      sim.freezeIdx = 0;

      // ✅ FIX: si no tenemos matchMins pero sí kickoffMs en el pasado, estimamos el minuto
      let effectiveMins = match.matchMins || 0;
      if (effectiveMins <= 0 && match.kickoffMs) {
        const msSinceKick = Date.now() - match.kickoffMs;
        if (msSinceKick > 0 && msSinceKick < 130 * 60 * 1000) {
          const rawMins = Math.floor(msSinceKick / 60000);
          // Si ya pasó >60 min de reloj, descontamos los ~15 del descanso
          effectiveMins = (rawMins > 60) ? Math.min(rawMins - 15, 90) : Math.min(rawMins, 45);
          match.matchMins = effectiveMins;
        }
      }

      // Coloca bola según minuto actual (fútbol). En tenis queda al inicio.
      const prog0 = (match.sport === 'football') ? clamp(effectiveMins / 90, 0, 1) : 0;
      sim.startTime = Date.now() - prog0 * sim.duration;


      const pitch0 = document.getElementById('pitch');
      if (pitch0) {
        const W0 = pitch0.clientWidth, H0 = pitch0.clientHeight;
        sim.x = clamp(prog0 * W0, BALL_R, Math.max(BALL_R, W0 - BALL_R));
        // Target inicial
        sim.targetIdx = (match.sport === 'tennis')
          ? calcTennisPN(match.homeScore, match.awayScore, 0, 0, 0, 0, false)
          : calcPN(match.homeScore, match.awayScore, prog0);

        if (match.idxBase != null && Number.isFinite(match.idxBase) && match.homeScore === 0 && match.awayScore === 0 && prog0 < 0.05) {
          // Partido pre-partido: la bola empieza guiada por la probabilidad pre-match probabilística
          sim.idx = clamp(match.idxBase, -10, 10);
          sim.targetIdx = sim.idx;
        } else if (Number.isFinite(sim.targetIdx)) {
          // Partido empezado (live): la bola arranca EXACTAMENTE donde le toca según los goles/juegos reales
          sim.idx = sim.targetIdx;
        } else {
          // Si no hay targetIdx ni idxBase, la bola arranca en el centro (0)
          sim.idx = 0;
        }

        // ✅ FIX: "Estrella fugaz" (Zoom) vs "Línea completa" (Normal)
        sim.pts = [];      // Estela histórica completa
        sim.tailPts = [];  // Cola corta de cometa (para zoom)

        const rel0 = sim.idx;
        const y0 = ((VIEW_RANGE - rel0) / (2 * VIEW_RANGE)) * H0;

        if (prog0 > 0) {
          const steps = Math.floor(prog0 * 600); // Historia completa
          let tempIdx = match.idxBase || 0;

          for (let i = 0; i < steps; i++) {
            const p = i / steps * prog0;
            const px = clamp(p * W0, BALL_R, Math.max(BALL_R, W0 - BALL_R));
            const tIdx = calcPN(match.homeScore, match.awayScore, p);
            tempIdx += (tIdx - tempIdx) * 0.05; // suavizado histórico
            const py = ((VIEW_RANGE - tempIdx) / (2 * VIEW_RANGE)) * H0;

            sim.pts.push({ x: px, y: py, _worldX: px, _worldY: py });

            // Guardamos los últimos 120 puntos en tailPts
            if (i >= steps - 120) {
              sim.tailPts.push({ x: px, y: py, _worldX: px, _worldY: py });
            }
          }
          // Si hubo menos de 120 puntos, copiamos los que haya
          if (sim.tailPts.length === 0) {
            sim.tailPts = [...sim.pts];
          }
        }

        document.getElementById('ball').setAttribute('transform', `translate(${sim.x},${y0})`);
        document.getElementById('trail').setAttribute('d', '');

      }

      // Tiempo visible
      if (match.sport === 'football') {
        const mm = Math.max(0, Math.floor(match.matchMins));
        const timeEl = document.getElementById('match-time');
        if (timeEl) timeEl.innerText = String(mm).padStart(2, '0') + ':00';
      }

      sim.active = true;
    }

    // ── ANIMATION FRAME (spring to target, no random) ──
    function frame(now) {
      if (!sim.active) return;
      const pitch = document.getElementById('pitch');
      const W = pitch.clientWidth, H = pitch.clientHeight;

      // Timing (dt) para animación consistente
      const nowMs = (typeof now === "number") ? now : performance.now();
      if (!sim.lastT) sim.lastT = nowMs;
      const dt = Math.min(0.05, (nowMs - sim.lastT) / 1000);
      sim.lastT = nowMs;

      // Pre-kick UI + congelación
      preKickUIUpdate();
      const preUnfreezeMs = PRE_UNFREEZE_MIN * 60000;
      const nowAbs = Date.now();
      const preKick = (match && match.kickoffMs && nowAbs < match.kickoffMs - preUnfreezeMs);
      if (preKick) {
        sim.freeze = true;
        sim.freezeIdx = (match.idxBase != null && Number.isFinite(match.idxBase)) ? clamp(match.idxBase, -10, 10) : 0;
      } else if (match && match.kickoffMs && nowAbs < match.kickoffMs) {
        sim.freeze = false;
      }


      // X = match time progress
      let prog = 0;
      if (match.sport === 'football') {
        if (sim.testMode && sim.testStart) {
          const e = Math.max(0, nowMs - sim.testStart);
          prog = clamp(e / (sim.testDuration || sim.duration), 0, 1);
          match.matchMins = prog * 90;
          const totalSecs = Math.floor(prog * 5400);
          const mm = Math.floor(totalSecs / 60);
          const ss = totalSecs % 60;
          const timeEl = document.getElementById('match-time');
          if (timeEl) timeEl.innerText = String(mm).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
        } else {
          // Si el API reportó 0 pero tenemos kickoff y score > 0, estimamos el tiempo en tiempo real
          let mmNum = (match.matchMins != null) ? parseFloat(match.matchMins) : 0;
          if (mmNum <= 0 && match.kickoffMs && match.homeScore + match.awayScore > 0) {
            const msSinceKick = Date.now() - match.kickoffMs;
            const rawMins = msSinceKick / 60000;
            if (rawMins > 0 && rawMins < 130) {
              mmNum = (rawMins > 60) ? Math.min(rawMins - 15, 90) : Math.min(rawMins, 45);
            }
          }

          // Normalizamos el máximo a 96 (los 90 min + 6 de añadido medio) para que no haya saltos hacia atrás si pasa del minuto 90.
          const maxMins = (match.comp && match.comp.toLowerCase().includes('cup')) ? 120 : 96;
          prog = mmNum > 0 ? clamp(mmNum / maxMins, 0, 1) : clamp((Date.now() - sim.startTime) / sim.duration, 0, 1);
          if (match && match.kickoffMs && Date.now() < match.kickoffMs) {
            prog = 0.0;
          }
        }
      } else {
        // tenis: usa progreso por juegos si existe
        if (sim.tennisTestMode && Number.isFinite(sim.tennisProg) && sim.tennisProg > 0) {
          prog = clamp(sim.tennisProg, 0, 1);
        } else {
          const mmIn = (match.matchMins != null) ? parseFloat(match.matchMins) : 0;
          const mmNum = Number.isFinite(mmIn) ? mmIn : 0;
          prog = mmNum > 0 ? clamp(mmNum / 90, 0, 1) : clamp((Date.now() - sim.startTime) / sim.duration, 0, 1);
        }
      }

      let targetX = prog * W;
      // Ajuste crucial: Dejar bastante margen en el borde derecho (ej. 24px) para que en el min 90+
      // el círculo + texto de la bola no se recorten ni activen scroll horizontal que oculte la bola.
      const RIGHT_MARGIN = 24;
      targetX = clamp(targetX, BALL_R, Math.max(BALL_R, W - RIGHT_MARGIN));
      if (sim.x == null) sim.x = targetX;
      const xAlpha = 1 - Math.exp(-10 * dt);
      sim.x += (targetX - sim.x) * xAlpha;

      if (!Number.isFinite(sim.targetIdx)) sim.targetIdx = 0;
      if (sim.freeze) {
        sim.idx = clamp(sim.freezeIdx, -10, 10);
        sim.v = 0;
      } else {
        const f = dt * 60;
        // ✅ FIX: Animación más suave y "flotante" al estar en Zoom
        const isZoom = typeof zoomOn !== 'undefined' && zoomOn;
        const randAmp = isZoom ? 0.03 : 0.12; // Menos saltos en zoom
        const pullAmp = isZoom ? 0.02 : 0.065; // Atracción más suave
        const randAcc = (Math.random() - 0.5) * randAmp * f;
        const pull = (sim.targetIdx - sim.idx) * pullAmp * f;
        sim.v += (randAcc + pull);
        sim.v *= Math.pow(isZoom ? 0.98 : 0.96, f); // Más inercia (flota más) en zoom
        sim.v = clamp(sim.v, -1.25, 1.25);
        sim.idx += sim.v;
        if (Math.abs(sim.idx) > 7) sim.v -= (sim.idx * 0.012) * f;
        sim.idx = clamp(sim.idx, -10, 10);
        // zoomCenterUI se actualiza desde la cámara (camViewCenter)
      }

      // Cámara/zoom: actualiza transform del fondo (y los parámetros cam*)
      applyBackgroundZoom();

      // Coordenadas mundo de la bola (mismo mapeo que SIN zoom)
      const worldX = sim.x;
      // Micro-movimiento pre-partido (muy leve, sin saltos): solo mueve la bola, no el índice
      const preWiggle = (preKick && sim.freeze) ? (Math.sin(nowMs / 420) * 0.08) : 0; // ±0.08 idx
      const worldY = ((VIEW_RANGE - (sim.idx + preWiggle)) / (2 * VIEW_RANGE)) * H;

      // Proyección a pantalla (bola y background sincronizados)
      let xScreen = worldX;
      let yScreen = worldY;
      if (zoomOn) {
        const cx = W / 2, cy = H / 2;
        xScreen = cx + camS * (worldX - cx) + camPanX;
        yScreen = cy + camS * (worldY - cy) + camPanY;
        zoomCenterUI = camViewCenter; // eje dinámico coincide con lo que estás viendo
      }

      if (!sim.freeze) {
        // Guardamos las coordenadas MUNDO para poder recalcular la pantalla correcta
        // si el usuario activa/desactiva el zoom, en vez de fijar las CSS directamente
        sim.pts = sim.pts || [];
        sim.tailPts = sim.tailPts || [];

        let lastPt = sim.pts[sim.pts.length - 1];
        let movedEnough = true;

        if (lastPt) {
          const dx = worldX - lastPt._worldX;
          const dy = worldY - lastPt._worldY;
          // Solo añadir punto si se ha movido al menos 0.5px (ahorra memoria, estela permanente)
          movedEnough = (dx * dx + dy * dy) > 0.25;
        }

        if (movedEnough || sim.pts.length === 0) {
          sim.pts.push({ _worldX: worldX, _worldY: worldY });
          sim.tailPts.push({ _worldX: worldX, _worldY: worldY });
        }
      }

      // Con la optimización de distancia, 15000 puntos cubren horas enteras sobradamente.
      if (sim.pts.length > 15000) sim.pts.shift();
      if (sim.tailPts.length > 120) sim.tailPts.shift(); // Cola de cometa corta

      if (!preKick) sim.ballAngle = (sim.ballAngle + (zoomOn ? 0.8 : 1.8)) % 360;
      document.getElementById('ball').setAttribute('transform', `translate(${xScreen},${yScreen}) rotate(${sim.ballAngle})`);

      tickAxis(nowMs);

      // Elegimos qué array de estela dibujar según el Zoom
      const activePts = zoomOn ? sim.tailPts : sim.pts;

      if (activePts && activePts.length > 1) {
        let d = '';
        for (let i = 0; i < activePts.length; i++) {
          const pt = activePts[i];
          // Recalculamos la posición PANTALLA de la estela histórica basándonos en el ZOOM actual
          let pX = pt._worldX != null ? pt._worldX : pt.x;
          let pY = pt._worldY != null ? pt._worldY : pt.y;
          if (zoomOn) {
            const cx = W / 2, cy = H / 2;
            pX = cx + camS * (pX - cx) + camPanX;
            pY = cy + camS * (pY - cy) + camPanY;
          }
          if (i === 0) d += `M ${pX} ${pY}`;
          else d += ` L ${pX} ${pY}`;
        }
        document.getElementById('trail').setAttribute('d', d);
      }

      const iv = document.getElementById('idx');
      iv.innerText = (sim.idx >= 0 ? '+' : '') + sim.idx.toFixed(1);
      iv.style.color = sim.idx >= 0 ? '#4ade80' : '#f87171';
      iv.style.textShadow = `0 0 30px ${sim.idx >= 0 ? 'rgba(74,222,128,.7)' : 'rgba(248,113,113,.7)'}`;
      updateLiveCredits();

      afId = requestAnimationFrame(frame);
    }

    function updateLiveCredits() {
      // Base = balance real (si existe) o stake de la posición (si está abierta)
      const base = pos ? (pos.stake ?? (profile?.balance ?? 1000)) : (profile?.balance ?? 1000);
      let live = base;
      if (pos) {
        const diff = pos.side === 'BUY' ? (sim.idx - pos.entryIdx) : (pos.entryIdx - sim.idx);
        live = base + (base * (diff / 10));
      }
      const el = document.getElementById('lcval');
      if (el) {
        el.innerText = Math.round(live);
        el.style.color = (live >= base) ? '#4ade80' : '#f87171';
      }
    }
